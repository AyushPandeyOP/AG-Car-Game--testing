<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW M4 Extreme - Ayush Pandey JI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; }
        
        /* LOBBY */
        #lobby { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; z-index: 100; }
        .title { font-size: 60px; font-weight: 900; font-style: italic; color: #ff0000; text-shadow: 0 0 20px #ff0000; margin: 0; }
        .dev { font-size: 18px; letter-spacing: 3px; color: #00d4ff; margin-bottom: 40px; }
        #start-btn { padding: 20px 60px; font-size: 25px; font-weight: bold; background: #fff; color: #000; border: none; cursor: pointer; skew: -20deg; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: 0.3s; }
        #start-btn:hover { background: #ff0000; color: #fff; transform: scale(1.1); }

        /* HUD */
        #hud { display: none; width: 100%; height: 100%; position: relative; }
        .nitro-bar { position: absolute; top: 30px; left: 50%; transform: translateX(-50%) skewX(-20deg); width: 400px; height: 12px; background: rgba(255,255,255,0.1); border: 2px solid #00d4ff; box-shadow: 0 0 15px #00d4ff; }
        #nitro-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #0044ff, #00d4ff); transition: 0.1s; }
        .speed { position: absolute; bottom: 40px; right: 60px; text-align: right; font-style: italic; }
        #kmh { font-size: 90px; font-weight: 900; line-height: 0.8; }
        .unit { font-size: 20px; color: #ff0000; }
    </style>
</head>
<body>

<div id="ui">
    <div id="lobby">
        <h1 class="title">BMW M4 ULTIMATE</h1>
        <div class="dev">DESIGNED & DEVELOPED BY AYUSH PANDEY JI</div>
        <button id="start-btn" onclick="startGame()">RACE NOW</button>
        <p style="margin-top:20px; opacity:0.6;">WASD: Drive | Shift: NITRO | Space: Drift</p>
    </div>

    <div id="hud">
        <div class="nitro-bar"><div id="nitro-fill"></div></div>
        <div class="speed">
            <div id="kmh">0</div>
            <div class="unit">KM/H</div>
        </div>
        <div style="position:absolute; bottom:10px; left:20px; font-size:12px; opacity:0.5;">Ayush Pandey JI Edition</div>
    </div>
</div>

<script>
let scene, camera, renderer, car, roadSegments = [], grassSegments = [];
let speed = 0, targetSpeed = 0, isNitro = false, active = false;
let audioCtx, engineOsc, nitroOsc;

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205);
    scene.fog = new THREE.Fog(0x020205, 30, 120);

    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 4, 10);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.body.appendChild(renderer.domElement);

    // Realistic Lighting
    const hemi = new THREE.HemisphereLight(0x00d4ff, 0xff0000, 0.6);
    scene.add(hemi);
    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(5, 10, 5);
    scene.add(sun);

    createRoad();
    createCar();
    animate();
}

function createRoad() {
    // Road with "Rough" material for better graphics
    const roadGeo = new THREE.PlaneGeometry(15, 100);
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8, metalness: 0.2 });
    
    for(let i=0; i<4; i++) {
        const r = new THREE.Mesh(roadGeo, roadMat);
        r.rotation.x = -Math.PI/2;
        r.position.z = -i * 100;
        scene.add(r);
        roadSegments.push(r);

        // Lines
        const lineGeo = new THREE.PlaneGeometry(0.2, 5);
        const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        for(let j=0; j<10; j++) {
            const line = new THREE.Mesh(lineGeo, lineMat);
            line.position.set(0, 0.02, (j*10) - 50);
            r.add(line);
        }
    }
}

function createCar() {
    car = new THREE.Group();
    // Body
    const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.7, 4.5), new THREE.MeshStandardMaterial({ color: 0xff0000, metalness: 0.9, roughness: 0.1 }));
    body.position.y = 0.5;
    car.add(body);
    
    // Windows/Cabin
    const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 2.5), new THREE.MeshStandardMaterial({ color: 0x050505 }));
    cabin.position.set(0, 1, -0.2);
    car.add(cabin);

    // Nitro Flames (Cone)
    const f1 = new THREE.Mesh(new THREE.ConeGeometry(0.2, 1.5, 8), new THREE.MeshBasicMaterial({ color: 0x00ffff }));
    f1.rotation.x = Math.PI/2; f1.position.set(0.6, 0.3, 2.5); f1.name="nitro"; f1.visible=false;
    car.add(f1);
    const f2 = f1.clone(); f2.position.x = -0.6; car.add(f2);

    scene.add(car);
}

// --- SOUND SYSTEM ---
function startSound() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    engineOsc = audioCtx.createOscillator();
    engineOsc.type = 'sawtooth';
    const gain = audioCtx.createGain();
    gain.gain.value = 0.05;
    engineOsc.connect(gain).connect(audioCtx.destination);
    engineOsc.start();
}

const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

function startGame() {
    active = true;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    startSound();
}

function animate() {
    requestAnimationFrame(animate);

    if(active) {
        // Controls
        if(keys['KeyW']) targetSpeed = keys['ShiftLeft'] ? 2.5 : 1.3;
        else targetSpeed = 0;
        
        speed = THREE.MathUtils.lerp(speed, targetSpeed, 0.03);
        isNitro = keys['ShiftLeft'] && speed > 1;

        // Nitro VFX & Shake
        car.children.forEach(c => { if(c.name==="nitro") c.visible = isNitro; });
        if(isNitro) {
            camera.position.x += (Math.random()-0.5)*0.1; 
            camera.position.y += (Math.random()-0.5)*0.1;
        }

        // Road movement logic
        roadSegments.forEach(r => {
            r.position.z += speed * 12;
            if(r.position.z > 100) r.position.z -= 400;
        });

        // Car Side Movement
        if(keys['KeyA']) car.position.x -= 0.15;
        if(keys['KeyD']) car.position.x += 0.15;
        car.rotation.z = - (car.position.x * 0.05); // Lean effect

        // Audio Update
        if(engineOsc) engineOsc.frequency.value = 50 + (speed * 100);

        // HUD Update
        document.getElementById('kmh').innerText = Math.floor(speed * 160);
        document.getElementById('nitro-fill').style.width = isNitro ? (Math.random()*20 + 30)+'%' : '100%';

        // Camera Follow
        camera.position.lerp(new THREE.Vector3(car.position.x * 0.5, 4 + speed, car.position.z + 10), 0.1);
        camera.lookAt(car.position.x, 1, car.position.z - 5);
    } else {
        // Lobby Camera
        camera.position.x = Math.sin(Date.now() * 0.0005) * 12;
        camera.position.z = Math.cos(Date.now() * 0.0005) * 12;
        camera.lookAt(0, 0, 0);
    }

    renderer.render(scene, camera);
}

init();
window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};
</script>
</body>
</html>
