<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VELOCITY RUSH • Asphalt 8 Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container"></div>

    <!-- START SCREEN + LOBBY ANIMATION -->
    <div id="start-screen" class="screen active">
        <div class="title-container">
            <h1>VELOCITY<br>RUSH</h1>
            <p class="subtitle">ASPHALT 8 • MORNING RUSH 250 KM/H</p>
            <div class="start-buttons">
                <button onclick="startWithAnimation()" class="play-btn">PLAY</button>
                <button onclick="showAbout()" class="secondary-btn">ABOUT</button>
            </div>
            <div class="version">AG STUDIO • 250 KM/H • NO DASH LINES</div>
        </div>
    </div>

    <!-- START ANIMATION (Asphalt 8 style lobby feel) -->
    <div id="start-animation" class="screen">
        <div class="animation-container">
            <div class="ag-logo">AG STUDIO</div>
            <div class="ready-text">GET READY...</div>
            <div id="countdown" class="countdown">3</div>
        </div>
    </div>

    <!-- ABOUT SCREEN -->
    <div id="about-screen" class="screen">
        <div class="modal-content">
            <h2>ABOUT THE GAME</h2>
            <p class="about-text">Designed and Developed by Ayush Pandey JI</p>
            <p class="about-sub">AG STUDIO Presents<br>250 KM/H Asphalt 8 Style Racing with Morning Weather 🌄</p>
            <button onclick="hideAbout()" class="secondary-btn">BACK TO MENU</button>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud" class="hud-container hidden">
        <div id="speedometer">
            <div class="speed-ring">
                <div id="speed-needle" class="needle"></div>
                <div class="speed-text">
                    <span id="speed-value">000</span>
                    <span class="unit">km/h</span>
                </div>
            </div>
        </div>
        <div id="nitro-hud">
            <div class="nitro-label">NITRO</div>
            <div class="nitro-bar-container">
                <div id="nitro-bar" class="nitro-bar"></div>
            </div>
        </div>
        <div id="distance-hud">
            <span id="distance-value">0</span><span class="unit">m</span>
        </div>
        <div id="drift-indicator" class="drift-text hidden">DRIFT</div>
        <div id="lane-indicator">
            <div class="lane-bar">
                <div id="player-dot" class="player-dot"></div>
            </div>
        </div>
    </div>

    <!-- PAUSE MENU -->
    <div id="pause-menu" class="screen hidden">
        <div class="modal-content pause-modal">
            <h2>PAUSED</h2>
            <button onclick="resumeGame()" class="menu-btn">RESUME RACE</button>
            <button onclick="showSettings()" class="menu-btn">SETTINGS</button>
            <button onclick="exitToMenu()" class="menu-btn">EXIT TO MENU</button>
        </div>
    </div>

    <!-- SETTINGS MENU -->
    <div id="settings-menu" class="screen hidden">
        <div class="modal-content">
            <h2>SETTINGS</h2>
            <div class="setting-item">
                <label>Graphics Quality</label>
                <select id="graphics-select" onchange="applySettings()">
                    <option value="high">HIGH (Console)</option>
                    <option value="medium" selected>MEDIUM</option>
                    <option value="low">LOW (Mobile)</option>
                </select>
            </div>
            <div class="setting-item">
                <label>Sound Effects</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="sound-toggle" checked onchange="applySettings()">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="setting-item">
                <label>Steering Sensitivity</label>
                <input type="range" id="sensitivity-slider" min="0.5" max="2" step="0.1" value="1.2" oninput="applySettings()">
                <span id="sensitivity-value" class="value-display">1.2x</span>
            </div>
            <button onclick="hideSettings()" class="secondary-btn">CLOSE</button>
        </div>
    </div>

    <!-- MOBILE CONTROLS -->
    <div id="mobile-controls" class="mobile-controls hidden">
        <div class="steering-zone">
            <button id="left-btn" class="touch-btn">◀</button>
            <button id="right-btn" class="touch-btn">▶</button>
        </div>
        <div class="action-zone">
            <button id="accel-btn" class="touch-btn accel">W</button>
            <button id="brake-btn" class="touch-btn brake">S</button>
            <button id="nitro-btn" class="touch-btn nitro">NITRO</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
