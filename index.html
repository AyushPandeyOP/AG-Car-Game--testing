<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Highway Racer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startScreen">
    <h1>HIGHWAY RACER</h1>
    <button id="playBtn">PLAY</button>
</div>

<div id="hud">
    <div id="speed">0 KM/H</div>
    <div id="nitroBar"><div id="nitroFill"></div></div>
</div>

<div id="mobileControls">
    <button id="leftBtn">◀</button>
    <button id="nitroBtn">⚡</button>
    <button id="rightBtn">▶</button>
</div>

<canvas id="game"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/loaders/GLTFLoader.js"></script>

<script src="script.js"></script>
</body>
</html>
