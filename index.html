<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Car Racing Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
        }

        canvas {
            display: block;
        }

        .hidden {
            display: none;
        }

        .menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        .button {
            background: #ff0000;
            padding: 20px;
            font-size: 20px;
            color: white;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            margin: 10px;
        }

        .button:hover {
            background-color: #ff6666;
        }

        .ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: Arial, sans-serif;
            z-index: 1;
        }

        #about {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: white;
            font-size: 14px;
        }

        .nitro-bar {
            position: absolute;
            top: 20px;
            width: 100%;
            height: 10px;
            background: rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .nitro-bar-filled {
            width: 0%;
            height: 100%;
            background: #ff0;
            transition: width 0.1s ease;
        }

        .speedometer {
            position: absolute;
            top: 50px;
            right: 30px;
            font-size: 30px;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div id="menu" class="menu">
        <h1>Endless Car Racing</h1>
        <button id="startButton" class="button">Start Game</button>
        <div id="about" class="hidden">
            Designer and developed by Ayush Pandey JI
        </div>
    </div>

    <div class="ui">
        <div class="speedometer" id="speedometer">Speed: 0 km/h</div>
        <div class="nitro-bar">
            <div class="nitro-bar-filled" id="nitroBar"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon-es/0.19.0/cannon-es.js"></script>

    <script>
        const menu = document.getElementById('menu');
        const startButton = document.getElementById('startButton');
        const aboutText = document.getElementById('about');
        const speedometer = document.getElementById('speedometer');
        const nitroBar = document.getElementById('nitroBar');

        let scene, camera, renderer, car, carModel, nitroAmount = 100;
        let controls, clock, deltaTime, speed = 0, nitroBoosting = false;

        const roadSegments = [];
        let gameStarted = false;

        // Setting up the scene
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();
            window.addEventListener('resize', onWindowResize, false);
            setupLighting();
            loadCarModel();
            setupControls();
            setupRoad();
            updateUI();
        }

        function setupLighting() {
            const ambientLight = new THREE.AmbientLight(0xcccccc, 1);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 10, 5);
            scene.add(directionalLight);
        }

        function loadCarModel() {
            const loader = new THREE.GLTFLoader();
            loader.load('https://threejs.org/examples/models/gltf/Car.glb', (gltf) => {
                carModel = gltf.scene;
                carModel.scale.set(0.5, 0.5, 0.5);
                car = carModel;
                scene.add(car);
                car.position.y = 1;
            });
        }

        function setupControls() {
            controls = {
                forward: false,
                backward: false,
                left: false,
                right: false,
                nitro: false
            };

            window.addEventListener('keydown', (event) => {
                if (event.code === 'ArrowUp' || event.code === 'KeyW') controls.forward = true;
                if (event.code === 'ArrowDown' || event.code === 'KeyS') controls.backward = true;
                if (event.code === 'ArrowLeft' || event.code === 'KeyA') controls.left = true;
                if (event.code === 'ArrowRight' || event.code === 'KeyD') controls.right = true;
                if (event.code === 'Space') controls.nitro = true;
            });

            window.addEventListener('keyup', (event) => {
                if (event.code === 'ArrowUp' || event.code === 'KeyW') controls.forward = false;
                if (event.code === 'ArrowDown' || event.code === 'KeyS') controls.backward = false;
                if (event.code === 'ArrowLeft' || event.code === 'KeyA') controls.left = false;
                if (event.code === 'ArrowRight' || event.code === 'KeyD') controls.right = false;
                if (event.code === 'Space') controls.nitro = false;
            });
        }

        function setupRoad() {
            const roadGeometry = new THREE.BoxGeometry(10, 0.1, 100);
            const roadMaterial = new THREE.MeshLambertMaterial({ color: 0x808080 });
            const road = new THREE.Mesh(roadGeometry, roadMaterial);
            scene.add(road);
            road.position.y = -0.05;
        }

        function updateUI() {
            // Update Speedometer and Nitro
            speedometer.innerText = `Speed: ${Math.floor(speed)} km/h`;
            nitroBar.style.width = `${nitroAmount}%`;

            if (controls.nitro && nitroAmount > 0) {
                nitroAmount -= 0.5;
                nitroBoosting = true;
            } else {
                nitroBoosting = false;
                if (nitroAmount < 100) nitroAmount += 0.2;
            }
        }

        function updateGame() {
            if (gameStarted) {
                deltaTime = clock.getDelta();
                if (car) {
                    if (controls.forward) speed += 0.5;
                    if (controls.backward) speed -= 0.5;

                    if (speed < 0) speed = 0;
                    if (speed > 200) speed = 200;

                    // Apply Nitro Effect
                    if (nitroBoosting) {
                        speed += 3;
                        car.scale.set(0.5, 0.5, 0.5);
                    }

                    car.position.z -= speed * deltaTime;
                    car.rotation.y += (controls.right - controls.left) * 0.05;

                    updateUI();
                    renderer.render(scene, camera);
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function startGame() {
            menu.classList.add('hidden');
            gameStarted = true;
            init();
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            updateGame();
        }

        startButton.addEventListener('click', startGame);

    </script>
</body>

</html>
