<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High-End 3D Racing Game</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="game-container"></div>

    <div id="ui-layer">
        
        <div id="start-screen" class="menu-screen">
            <h1 class="game-title">ASPHALT <span>WEB</span></h1>
            <button id="btn-play" class="action-btn">PLAY</button>
            <div class="credits">Designed and Developed by Ayush Pandey JI</div>
        </div>

        <div id="hud" class="hidden">
            <div class="speedometer">
                <div class="speed-val" id="speed-val">0</div>
                <div class="speed-unit">KM/H</div>
            </div>
            <div class="nitro-container">
                <div class="nitro-bar" id="nitro-bar"></div>
                <div class="nitro-label">NITRO</div>
            </div>
            <button id="btn-pause" class="icon-btn">⏸</button>
            
            <div id="mobile-controls">
                <button id="btn-left" class="mob-btn">◀</button>
                <button id="btn-right" class="mob-btn">▶</button>
                <button id="btn-nitro-mob" class="mob-btn nitro-mob">⚡</button>
            </div>
        </div>

        <div id="pause-screen" class="menu-screen hidden">
            <h2>PAUSED</h2>
            <button id="btn-resume" class="action-btn">RESUME</button>
            
            <div class="settings-panel">
                <h3>SETTINGS</h3>
                <div class="setting-row">
                    <label>Graphics Quality</label>
                    <select id="setting-graphics">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High (Bloom)</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>Steering Sensitivity</label>
                    <input type="range" id="setting-sens" min="1" max="10" value="5">
                </div>
            </div>
        </div>

        <div id="game-over-screen" class="menu-screen hidden">
            <h2 style="color: #ff3333;">CRASHED!</h2>
            <div id="final-score">Score: 0</div>
            <button id="btn-restart" class="action-btn">RESTART</button>
        </div>

    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
