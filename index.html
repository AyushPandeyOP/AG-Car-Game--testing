<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW M4 - Ayush Pandey JI Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Arial Black', sans-serif; }
        
        /* --- ASPHALT 8 INSPIRED UI --- */
        #ui-container {
            position: absolute; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
        }

        /* LOBBY STYLE */
        #lobby {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: auto; text-align: center; color: white;
        }

        .title-card {
            font-size: 60px; font-style: italic; text-transform: uppercase;
            letter-spacing: -2px; color: #ff0000; text-shadow: 4px 4px 0px #fff;
            margin-bottom: 5px;
        }

        .credits { font-size: 14px; color: #00d4ff; letter-spacing: 2px; margin-bottom: 30px; }

        #start-btn {
            padding: 20px 80px; font-size: 28px; background: #fff; color: #000;
            border: none; cursor: pointer; font-weight: 900; skew: -20deg;
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
            transition: 0.3s; pointer-events: auto;
        }
        #start-btn:hover { background: #ff0000; color: #fff; transform: scale(1.1); }

        /* HUD */
        #hud { display: none; width: 100%; height: 100%; position: relative; }
        
        .nitro-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 400px; height: 15px; background: rgba(0,0,0,0.5);
            border: 2px solid #00d4ff; transform: skewX(-20deg);
        }
        #nitro-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #0055ff, #00d4ff); transition: 0.1s; }

        .speedometer {
            position: absolute; bottom: 40px; right: 50px; text-align: right;
            color: #fff; font-style: italic; border-right: 5px solid #ff0000; padding-right: 15px;
        }
        #speed-num { font-size: 80px; line-height: 1; }

        /* SETTINGS & ABOUT */
        #settings-btn {
            position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2);
            color: #fff; border: none; padding: 10px; cursor: pointer; pointer-events: auto;
        }
        #settings-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); padding: 30px; border: 2px solid #ff0000;
            display: none; color: #fff; pointer-events: auto; width: 300px;
        }
    </style>
</head>
<body>

<div id="ui-container">
    <div id="lobby">
        <div class="title-card">BMW M4 ULTIMATE</div>
        <div class="credits">DESIGNED & DEVELOPED BY AYUSH PANDEY JI</div>
        <button id="start-btn" onclick="initGame()">RACE NOW</button>
        <p style="margin-top: 15px;">W-A-S-D to Drive | SHIFT for NITRO</p>
    </div>

    <div id="hud">
        <div class="nitro-container"><div id="nitro-fill"></div></div>
        <div class="speedometer">
            <div id="speed-num">0</div>
            <div>KM/H</div>
        </div>
        <div style="position:absolute; bottom:10px; left:20px; color:rgba(255,255,255,0.5);">Ayush Pandey JI Edition</div>
        <button id="settings-btn" onclick="showSettings()">⚙️ SETTINGS</button>
    </div>

    <div id="settings-modal">
        <h2>GAME SETTINGS</h2>
        <p>Graphics: <select id="gfx"><option>HIGH</option><option>LOW</option></select></p>
        <hr>
        <p><b>ABOUT:</b><br>Designer And developed By Ayush Pandey JI</p>
        <button onclick="showSettings()" style="width:100%; padding:10px; cursor:pointer;">CLOSE</button>
    </div>
</div>

<script>
let scene, camera, renderer, car, roadSegments = [];
let speed = 0, isNitro = false, active = false;

// Pre-setup scene for Lobby background
const lobbyScene = new THREE.Scene();
const lobbyCam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer_main = new THREE.WebGLRenderer({ antialias: true });
renderer_main.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer_main.domElement);

function createWorld() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111122);
    scene.fog = new THREE.Fog(0x111122, 20, 100);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 8);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040, 2));

    // Road segments
    const roadGeo = new THREE.PlaneGeometry(12, 100);
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    for(let i=0; i<3; i++) {
        let r = new THREE.Mesh(roadGeo, roadMat);
        r.rotation.x = -Math.PI/2;
        r.position.z = -i * 100;
        scene.add(r);
        roadSegments.push(r);
    }

    // BMW M4 Placeholder (Better looking)
    car = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 4), new THREE.MeshStandardMaterial({color: 0xff0000, metalness: 0.8, roughness: 0.2}));
    car.add(body);
    const roof = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.6, 2), new THREE.MeshStandardMaterial({color: 0x111111}));
    roof.position.set(0, 0.6, -0.2);
    car.add(roof);
    
    // Wheels
    const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 12);
    const wheelMat = new THREE.MeshStandardMaterial({color: 0x000000});
    for(let x of [-1.1, 1.1]) {
        for(let z of [-1.3, 1.3]) {
            let w = new THREE.Mesh(wheelGeo, wheelMat);
            w.rotation.z = Math.PI/2;
            w.position.set(x, -0.2, z);
            car.add(w);
        }
    }

    // Nitro Effect
    const nitroFlame = new THREE.Mesh(new THREE.ConeGeometry(0.2, 2, 8), new THREE.MeshBasicMaterial({color: 0x00ffff}));
    nitroFlame.position.set(0, -0.2, 2.5);
    nitroFlame.rotation.x = Math.PI/2;
    nitroFlame.name = "flame";
    nitroFlame.visible = false;
    car.add(nitroFlame);

    // Lobby Girl Placeholder
    const girl = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.6, 0.5), new THREE.MeshStandardMaterial({color: 0xffcc99}));
    girl.position.set(-2.5, 0.8, 0);
    scene.add(girl);

    scene.add(car);
}

function initGame() {
    active = true;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
}

function showSettings() {
    const m = document.getElementById('settings-modal');
    m.style.display = m.style.display === 'block' ? 'none' : 'block';
}

const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

function update() {
    if(!active) {
        // Lobby slow rotate camera
        renderer_main.render(scene, camera);
        camera.position.x = Math.sin(Date.now()*0.001)*10;
        camera.lookAt(0,0,0);
        return;
    };

    let targetSpeed = 0;
    if(keys['KeyW']) targetSpeed = keys['ShiftLeft'] ? 2.5 : 1.2;
    speed = THREE.MathUtils.lerp(speed, targetSpeed, 0.05);
    
    isNitro = keys['ShiftLeft'] && speed > 1;
    car.getObjectByName("flame").visible = isNitro;
    
    // Road movement
    roadSegments.forEach(r => {
        r.position.z += speed * 10;
        if(r.position.z > 100) r.position.z -= 300;
    });

    // Side movement
    if(keys['KeyA']) car.position.x -= 0.15;
    if(keys['KeyD']) car.position.x += 0.15;
    car.position.x = THREE.MathUtils.clamp(car.position.x, -5, 5);

    // UI
    document.getElementById('speed-num').innerText = Math.floor(speed * 180);
    document.getElementById('nitro-fill').style.width = isNitro ? '30%' : '100%';

    // Camera follow
    camera.position.lerp(new THREE.Vector3(car.position.x * 0.5, 3 + (speed*0.5), car.position.z + 8), 0.1);
    camera.lookAt(car.position.x, 0, car.position.z - 5);

    renderer_main.render(scene, camera);
}

createWorld();
function animate() {
    requestAnimationFrame(animate);
    update();
}
animate();

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer_main.setSize(window.innerWidth, window.innerHeight);
};
</script>
</body>
</html>
